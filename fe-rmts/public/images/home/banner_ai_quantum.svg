<svg width="1920" height="600" viewBox="0 0 1920 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d0d2b"/>
      <stop offset="100%" stop-color="#1a1a40"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1920" height="600" fill="url(#grad)"/>
  <!-- Abstract quantum circuit lines -->
  <path d="M200 300 C400 100, 800 500, 1000 300 S1600 100, 1800 300" stroke="#00bfff" stroke-width="2" filter="url(#glow)"/>
  <!-- Neural network node -->
  <circle cx="960" cy="300" r="60" fill="#ff6aff" filter="url(#glow)"/>
</svg>
